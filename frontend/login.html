<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet" href="css/style.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1e1b4b,#4c1d95,#0f172a);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
}

header h1 {
  font-size: 20px;
  color: #c084fc;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

nav a:hover {
  color: #c084fc;
}

button {
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  background: #ef4444;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #dc2626;
}

/* CENTER AREA */
.hero {
  height: calc(100vh - 80px);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* GLASS LOGIN BOX */
.login-box {
  width: 340px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  box-shadow: 0 0 30px rgba(168,85,247,0.3);
  border: 1px solid rgba(168,85,247,0.2);
}

.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #c084fc;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
  outline: none;
}

.login-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #a855f7;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.login-btn:hover {
  background: #9333ea;
}

.link {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #ddd;
}
</style>

</head>

<body>

<dir>

<h1>Beauty Salon Marketplace</h1>


</dir>
</header>

<div class="hero">

  <div class="login-box">

    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="login-btn" onclick="login()">
      Login
    </button>

    <div class="link">
      Don’t have an account? Register
    </div>

  </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
